services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_docs
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - expense_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_docs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  expense_postgres_data:
